name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Build Layer
        run: npm run build
      - name: Smoke Test
        run: npm run smoke:test
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-browsershot-layer-zip
          path: dist/sidecar-browsershot-layer.zip
          retention-days: 1

  deploy-test-canary:
    needs: build
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: sidecar-browsershot-layer-zip
          path: dist
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # Default canary region
      - name: Deploy Canary
        run: bin/canary-deploy.sh --stage test
      - name: Invoke Canary
        run: bin/canary-invoke.sh --stage test

  deploy-prod:
    needs: deploy-test-canary
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: sidecar-browsershot-layer-zip
          path: dist
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Publish to All Regions
        run: bin/publish-layer.sh --stage prod

  update-readme:
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Update README with latest ARNs
        run: bin/update-readme-arns.sh --stage prod
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update layer ARNs for ${{ github.ref_name }}"
          file_pattern: README.md
          branch: main
